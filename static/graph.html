<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Plant Brain — Knowledge Graph</title>
<style>
  :root {
    --bg:#0d1117; --panel:#161b22; --line:#2d333b; --text:#e6edf3; --dim:#8b949e;
    --accent:#4da3ff;
  }
  * { box-sizing:border-box; margin:0; }
  html,body { height:100%; }
  body { background:var(--bg); color:var(--text);
         font:14px/1.5 "Segoe UI", system-ui, sans-serif; overflow:hidden; }
  header { display:flex; align-items:center; gap:14px; padding:10px 18px;
           border-bottom:1px solid var(--line); flex-wrap:wrap; }
  header h1 { font-size:17px; }
  header a { color:var(--accent); text-decoration:none; font-size:13px; }
  header .sub { color:var(--dim); font-size:12px; }
  select, button { background:var(--panel); color:var(--text);
                   border:1px solid var(--line); border-radius:7px;
                   padding:6px 10px; font-size:13px; cursor:pointer; }
  button.active { background:var(--accent); color:#04121f; font-weight:600; }
  #wrap { position:absolute; top:52px; left:0; right:0; bottom:0; }
  svg { width:100%; height:100%; display:block; cursor:grab; }
  svg.panning { cursor:grabbing; }
  line.link { stroke:#39414d; stroke-width:1; }
  text.rel { fill:#6b7480; font-size:8px; pointer-events:none; }
  circle.node { cursor:pointer; stroke:#0d1117; stroke-width:1.5; }
  text.label { fill:var(--text); font-size:9px; pointer-events:none;
               text-anchor:middle; paint-order:stroke; stroke:#0d1117;
               stroke-width:2.5px; }
  #legend { position:absolute; top:64px; right:16px; background:rgba(22,27,34,.9);
            border:1px solid var(--line); border-radius:9px; padding:10px 12px;
            font-size:12px; max-width:190px; }
  #legend div { display:flex; align-items:center; gap:7px; margin:3px 0; }
  #legend i { width:11px; height:11px; border-radius:50%; display:inline-block; }
  #hint { position:absolute; bottom:14px; left:16px; color:var(--dim);
          font-size:12px; }
  #count { color:var(--dim); font-size:12px; }
</style>
</head>
<body>
<header>
  <h1>Knowledge Graph</h1>
  <a href="/">← back to Plant Brain</a>
  <span class="sub">|</span>
  <button id="btn-overview" class="active" onclick="load('')">Overview</button>
  <select id="focus" onchange="load(this.value)">
    <option value="">Focus on equipment…</option>
  </select>
  <span id="count"></span>
</header>
<div id="wrap">
  <svg id="svg"><g id="viewport">
    <g id="links"></g><g id="rels"></g><g id="nodes"></g>
  </g></svg>
</div>
<div id="legend"></div>
<div id="hint">drag nodes to arrange · scroll to zoom · drag background to pan ·
  click an equipment node to focus its neighbourhood</div>

<script>
const COLORS = {
  Site:"#e6edf3", Area:"#9aa5b1", Equipment:"#4da3ff", FailureMode:"#f85149",
  WorkOrder:"#d29922", Procedure:"#3fb950", Clause:"#a371f7", Standard:"#c9a227",
  Process:"#2dd4bf", NCR:"#ff7b72", Alert:"#ff9800", TacitKnowledge:"#ec4899",
  InspectionRecord:"#56d364", Chunk:"#6b7480",
};
const SIZE = { Equipment:11, Site:12, Standard:11, Area:9, Alert:9, NCR:8,
               Clause:8, Process:8, FailureMode:8 };
const svg = document.getElementById("svg");
const gLinks = document.getElementById("links");
const gRels = document.getElementById("rels");
const gNodes = document.getElementById("nodes");
const viewport = document.getElementById("viewport");
const NS = "http://www.w3.org/2000/svg";
let nodes = [], links = [], nodeById = {}, anim = null;
let view = { x:0, y:0, k:1 };

function size(g){ return SIZE[g] || 6.5; }

async function load(focus){
  document.getElementById("btn-overview").classList.toggle("active", !focus);
  document.getElementById("focus").value = focus || "";
  const data = await fetch("/api/graph" + (focus ? "?focus="+encodeURIComponent(focus) : ""))
                     .then(r=>r.json());
  // populate focus dropdown once
  const sel = document.getElementById("focus");
  if(sel.options.length <= 1 && data.equipment){
    for(const tag of data.equipment){
      const o = document.createElement("option"); o.value=o.textContent=tag;
      sel.appendChild(o);
    }
    sel.value = focus || "";
  }
  const W = svg.clientWidth, H = svg.clientHeight;
  nodeById = {};
  nodes = data.nodes.map((n,i) => {
    const a = (i / data.nodes.length) * Math.PI * 2;
    const o = { ...n, x: W/2 + Math.cos(a)*180 + (Math.random()-.5)*40,
                y: H/2 + Math.sin(a)*180 + (Math.random()-.5)*40, vx:0, vy:0,
                fixed:false };
    nodeById[n.id] = o; return o;
  });
  links = data.links.map(l => ({ ...l, s: nodeById[l.source], t: nodeById[l.target] }))
                    .filter(l => l.s && l.t);
  document.getElementById("count").textContent =
    `${nodes.length} nodes · ${links.length} relationships` +
    (focus ? ` · focused on ${focus}` : "");
  buildLegend();
  render();
  view = { x:0, y:0, k:1 }; applyView();
  restart();
}

function buildLegend(){
  const present = [...new Set(nodes.map(n=>n.group))];
  document.getElementById("legend").innerHTML = present.map(g =>
    `<div><i style="background:${COLORS[g]||'#888'}"></i>${g}</div>`).join("");
}

function render(){
  gLinks.innerHTML = gRels.innerHTML = gNodes.innerHTML = "";
  for(const l of links){
    const ln = document.createElementNS(NS,"line");
    ln.setAttribute("class","link"); l.el = ln; gLinks.appendChild(ln);
  }
  for(const n of nodes){
    const c = document.createElementNS(NS,"circle");
    c.setAttribute("class","node"); c.setAttribute("r", size(n.group));
    c.setAttribute("fill", COLORS[n.group] || "#888");
    c.appendChild(mkTitle(`${n.group}: ${n.name}`));
    n.el = c; gNodes.appendChild(c);
    const t = document.createElementNS(NS,"text");
    t.setAttribute("class","label"); t.setAttribute("dy", -size(n.group)-3);
    t.textContent = n.name; n.lbl = t; gNodes.appendChild(t);
    if(n.group === "Equipment"){
      c.style.cursor = "pointer";
      c.addEventListener("dblclick", e => { e.stopPropagation(); load(n.name); });
    }
    dragify(n, c);
  }
}
function mkTitle(txt){ const e=document.createElementNS(NS,"title"); e.textContent=txt; return e; }

// ---- force simulation ----
const REPULSE = 2600, SPRING = 0.03, LINKLEN = 78, DAMP = 0.86, CENTER = 0.004;
let alpha = 1;
function restart(){ alpha = 1; if(!anim) anim = requestAnimationFrame(tick); }

function tick(){
  const W = svg.clientWidth, H = svg.clientHeight, cx=W/2, cy=H/2;
  const n = nodes.length;
  for(let i=0;i<n;i++){
    const a = nodes[i];
    for(let j=i+1;j<n;j++){
      const b = nodes[j];
      let dx=a.x-b.x, dy=a.y-b.y, d2=dx*dx+dy*dy||1;
      const f = REPULSE/d2, d=Math.sqrt(d2);
      const fx=f*dx/d, fy=f*dy/d;
      a.vx+=fx; a.vy+=fy; b.vx-=fx; b.vy-=fy;
    }
  }
  for(const l of links){
    let dx=l.t.x-l.s.x, dy=l.t.y-l.s.y, d=Math.sqrt(dx*dx+dy*dy)||1;
    const f=SPRING*(d-LINKLEN), fx=f*dx/d, fy=f*dy/d;
    l.s.vx+=fx; l.s.vy+=fy; l.t.vx-=fx; l.t.vy-=fy;
  }
  for(const a of nodes){
    a.vx += (cx-a.x)*CENTER; a.vy += (cy-a.y)*CENTER;
    if(a.fixed) { a.vx=a.vy=0; continue; }
    a.vx*=DAMP; a.vy*=DAMP;
    a.x += a.vx*alpha; a.y += a.vy*alpha;
  }
  draw();
  alpha *= 0.992;
  if(alpha > 0.02) anim = requestAnimationFrame(tick);
  else anim = null;
}

function draw(){
  for(const l of links){
    l.el.setAttribute("x1",l.s.x); l.el.setAttribute("y1",l.s.y);
    l.el.setAttribute("x2",l.t.x); l.el.setAttribute("y2",l.t.y);
  }
  for(const n of nodes){
    n.el.setAttribute("cx",n.x); n.el.setAttribute("cy",n.y);
    n.lbl.setAttribute("x",n.x); n.lbl.setAttribute("y",n.y);
  }
}

// ---- interaction: node drag, background pan, wheel zoom ----
function svgPt(evt){
  const r = svg.getBoundingClientRect();
  return { x:(evt.clientX-r.left-view.x)/view.k, y:(evt.clientY-r.top-view.y)/view.k };
}
function dragify(n, el){
  el.addEventListener("pointerdown", e => {
    e.stopPropagation(); el.setPointerCapture(e.pointerId); n.fixed=true;
    const move = ev => { const p=svgPt(ev); n.x=p.x; n.y=p.y; restart(); };
    const up = () => { n.fixed=false; el.removeEventListener("pointermove",move);
                       el.removeEventListener("pointerup",up); restart(); };
    el.addEventListener("pointermove",move); el.addEventListener("pointerup",up);
  });
}
let pan=null;
svg.addEventListener("pointerdown", e => {
  pan={sx:e.clientX, sy:e.clientY, vx:view.x, vy:view.y}; svg.classList.add("panning");
});
svg.addEventListener("pointermove", e => {
  if(!pan) return; view.x=pan.vx+(e.clientX-pan.sx); view.y=pan.vy+(e.clientY-pan.sy);
  applyView();
});
window.addEventListener("pointerup", ()=>{ pan=null; svg.classList.remove("panning"); });
svg.addEventListener("wheel", e => {
  e.preventDefault();
  const r=svg.getBoundingClientRect(), mx=e.clientX-r.left, my=e.clientY-r.top;
  const factor = e.deltaY<0 ? 1.1 : 1/1.1, nk=Math.max(0.2,Math.min(4,view.k*factor));
  view.x = mx-(mx-view.x)*(nk/view.k); view.y = my-(my-view.y)*(nk/view.k);
  view.k = nk; applyView();
}, {passive:false});
function applyView(){
  viewport.setAttribute("transform",`translate(${view.x},${view.y}) scale(${view.k})`);
}

load("");
</script>
</body>
</html>
